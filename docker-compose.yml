version: "3.9"

services:
  backend:
    build:
      context: ./backend
    container_name: db_control_backend
    restart: unless-stopped
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      APP_DATA_DIR: /app/data
      CORS_ORIGINS: http://localhost:3000,http://frontend
    volumes:
      - backend_data:/app/data
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    container_name: db_control_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  backend_data: